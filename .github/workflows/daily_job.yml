# GitHub Actions 工作流配置
# 每日自动执行股票资讯采集任务

name: Daily Stock News Collection

on:
  # 定时触发：每天北京时间 6:00 执行
  schedule:
    - cron: "0 22 * * *"  # GitHub Actions 使用 UTC 时间，22:00 UTC = 次日 6:00 北京时间

  # 手动触发
  workflow_dispatch:

  # 推送时触发 (测试用)
  push:
    branches: [main]
    paths:
      - 'collectors/**'
      - 'processor/**'
      - 'notifier/**'
      - 'config/**'
      - 'main.py'

env:
  PYTHON_VERSION: "3.11"

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data logs

      - name: 初始化数据库
        run: |
          python -m config.database

      - name: 创建 .env 文件
        run: |
          cat > .env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SERVERCHAN_SENDKEY=${{ secrets.SERVERCHAN_SENDKEY }}
          GEWE_BOT_URL=${{ secrets.GEWE_BOT_URL }}
          GEWE_BOT_TOKEN=${{ secrets.GEWE_BOT_TOKEN }}
          DATABASE_PATH=./data/stock_news.db
          LOG_LEVEL=INFO
          EOF

      - name: 执行采集任务
        id: run_task
        run: |
          echo "开始执行股票资讯采集任务..."
          echo "执行时间：$(date '+%Y-%m-%d %H:%M:%S')"

          python main.py run

          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

          if [ $exit_code -eq 0 ]; then
            echo "✅ 任务执行成功"
          else
            echo "❌ 任务执行失败"
            exit 1
          fi

      - name: 上传日志 (如果失败)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: logs/
          retention-days: 7

      - name: 发送失败通知
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ 股票资讯任务执行失败 - ${new Date().toLocaleDateString('zh-CN')}`,
              body: `任务执行失败，请查看 Actions 日志了解详情。\n\n失败时间：${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`
            })
